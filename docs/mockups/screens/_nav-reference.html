<!-- === HTML (add at end of phone content, before closing phone div) === -->
<!--
  Active tab options: add class="nav-item active" to the relevant item.
  - Home (Inicio): screens that show from Home tab
  - BarChart3: Trends/Analytics
  - Lightbulb: Insights (if accessed via nav)
  - Bell: Alerts
  - No active: screens accessed via Profile Dropdown (History, Items, Settings)
  - No nav at all: Transaction Editor, Batch Capture, Batch Review (full-screen)
-->

<div class="bottom-nav">
  <!-- Home -->
  <div class="nav-item active">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <span class="nav-label">Inicio</span>
  </div>
  <!-- BarChart3 -->
  <div class="nav-item">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </div>
    <span class="nav-label" style="visibility:hidden;">_</span>
  </div>
  <!-- FAB (center) -->
  <div class="fab-wrapper">
    <span class="fab-badge-left">100</span>
    <span class="fab-badge-right">1K</span>
    <button class="fab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>
  </div>
  <!-- Lightbulb -->
  <div class="nav-item">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18h6"/>
        <path d="M10 22h4"/>
        <path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/>
      </svg>
    </div>
    <span class="nav-label" style="visibility:hidden;">_</span>
  </div>
  <!-- Bell -->
  <div class="nav-item">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <span class="nav-label" style="visibility:hidden;">_</span>
    <div class="alert-dot"></div>
  </div>
</div>
