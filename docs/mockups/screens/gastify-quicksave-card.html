<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickSave Card — Gastify (Production Design System)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Baloo+2:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       GASTIFY — PRODUCTION DESIGN SYSTEM
       Themes: Normal / Professional / Mono
       Modes: Light / Dark
       ══════════════════════════════════════════ */

    /* ── Normal Light (default) ── */
    :root {
      --bg: #f5f0e8;
      --surface: #fff;
      --primary: #4a7c59;
      --text: #2d3a4a;
      --secondary: #4a5568;
      --accent: #e8a87c;
      --border: #e3bba1;
      --bg-tertiary: #f1dbb6;
      --secondary-color: #5b8fa8;
      --primary-rgb: 74, 124, 89;
      --nav-bg: #4a5568;
      --shadow: rgba(74, 124, 89, 0.12);
      --shadow-lg: rgba(74, 124, 89, 0.18);
      --frame-bg: #1a1a2e;
      --status-bar-text: #fff;
      --fab-gradient-from: #4a7c59;
      --fab-gradient-to: #3d6b4b;
      --success: #7d9b5f;
      --success-light: rgba(125, 155, 95, 0.15);
      --error: #ef4444;
      --warning: #f59e0b;
      --warning-light: rgba(245, 158, 11, 0.15);
      --warning-border: rgba(245, 158, 11, 0.4);
      --warning-text: #d97706;
      --overlay-bg: rgba(0, 0, 0, 0.4);
      --cat-alimentacion: #4a7c59;
    }

    /* ── Normal Dark ── */
    [data-theme="normal"][data-mode="dark"] {
      --bg: #1a2420;
      --surface: #243028;
      --primary: #6b9e7a;
      --text: #e8e4dc;
      --secondary: #b8c4a8;
      --border: #3d4d42;
      --bg-tertiary: #2d3a30;
      --secondary-color: #7ab5cc;
      --primary-rgb: 107, 158, 122;
      --nav-bg: #1e2a22;
      --shadow: rgba(0,0,0,0.3);
      --shadow-lg: rgba(0,0,0,0.4);
      --frame-bg: #0a0f0c;
      --status-bar-text: #e8e4dc;
      --accent: #d4a574;
      --fab-gradient-from: #6b9e7a;
      --fab-gradient-to: #5a8a68;
      --success: #7d9b5f;
      --success-light: rgba(125, 155, 95, 0.2);
      --error: #ef4444;
      --warning: #fbbf24;
      --warning-light: rgba(251, 191, 36, 0.1);
      --warning-border: rgba(251, 191, 36, 0.3);
      --warning-text: #fbbf24;
      --overlay-bg: rgba(0, 0, 0, 0.55);
      --cat-alimentacion: #6b9e7a;
    }

    /* ── Professional Light ── */
    [data-theme="professional"][data-mode="light"] {
      --bg: #f8fafc;
      --surface: #fff;
      --primary: #2563eb;
      --text: #0f172a;
      --secondary: #64748b;
      --accent: #3b82f6;
      --border: #e2e8f0;
      --bg-tertiary: #f1f5f9;
      --secondary-color: #0ea5e9;
      --primary-rgb: 37, 99, 235;
      --nav-bg: #1e293b;
      --shadow: rgba(37, 99, 235, 0.08);
      --shadow-lg: rgba(37, 99, 235, 0.12);
      --frame-bg: #1e293b;
      --status-bar-text: #fff;
      --fab-gradient-from: #2563eb;
      --fab-gradient-to: #1d4ed8;
      --success: #22c55e;
      --success-light: rgba(34, 197, 94, 0.12);
      --error: #ef4444;
      --warning: #f59e0b;
      --warning-light: rgba(245, 158, 11, 0.1);
      --warning-border: rgba(245, 158, 11, 0.3);
      --warning-text: #d97706;
      --overlay-bg: rgba(0, 0, 0, 0.4);
      --cat-alimentacion: #2563eb;
    }

    /* ── Professional Dark ── */
    [data-theme="professional"][data-mode="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --primary: #3b82f6;
      --text: #f1f5f9;
      --secondary: #94a3b8;
      --accent: #60a5fa;
      --border: #334155;
      --bg-tertiary: #1e293b;
      --secondary-color: #38bdf8;
      --primary-rgb: 59, 130, 246;
      --nav-bg: #0f172a;
      --shadow: rgba(0,0,0,0.3);
      --shadow-lg: rgba(0,0,0,0.4);
      --frame-bg: #020617;
      --status-bar-text: #f1f5f9;
      --fab-gradient-from: #3b82f6;
      --fab-gradient-to: #2563eb;
      --success: #4ade80;
      --success-light: rgba(74, 222, 128, 0.15);
      --error: #ef4444;
      --warning: #fbbf24;
      --warning-light: rgba(251, 191, 36, 0.1);
      --warning-border: rgba(251, 191, 36, 0.3);
      --warning-text: #fbbf24;
      --overlay-bg: rgba(0, 0, 0, 0.55);
      --cat-alimentacion: #3b82f6;
    }

    /* ── Mono Light ── */
    [data-theme="mono"][data-mode="light"] {
      --bg: #fafafa;
      --surface: #fff;
      --primary: #18181b;
      --text: #18181b;
      --secondary: #71717a;
      --accent: #52525b;
      --border: #e4e4e7;
      --bg-tertiary: #f4f4f5;
      --secondary-color: #3f3f46;
      --primary-rgb: 24, 24, 27;
      --nav-bg: #27272a;
      --shadow: rgba(0,0,0,0.06);
      --shadow-lg: rgba(0,0,0,0.1);
      --frame-bg: #18181b;
      --status-bar-text: #fff;
      --fab-gradient-from: #18181b;
      --fab-gradient-to: #27272a;
      --success: #3f3f46;
      --success-light: rgba(63, 63, 70, 0.1);
      --error: #ef4444;
      --warning: #a1a1aa;
      --warning-light: rgba(161, 161, 170, 0.15);
      --warning-border: rgba(161, 161, 170, 0.4);
      --warning-text: #52525b;
      --overlay-bg: rgba(0, 0, 0, 0.4);
      --cat-alimentacion: #18181b;
    }

    /* ── Mono Dark ── */
    [data-theme="mono"][data-mode="dark"] {
      --bg: #09090b;
      --surface: #18181b;
      --primary: #a1a1aa;
      --text: #fafafa;
      --secondary: #a1a1aa;
      --accent: #71717a;
      --border: #27272a;
      --bg-tertiary: #18181b;
      --secondary-color: #71717a;
      --primary-rgb: 63, 63, 70;
      --nav-bg: #09090b;
      --shadow: rgba(0,0,0,0.4);
      --shadow-lg: rgba(0,0,0,0.5);
      --frame-bg: #000;
      --status-bar-text: #fafafa;
      --fab-gradient-from: #3f3f46;
      --fab-gradient-to: #27272a;
      --success: #a1a1aa;
      --success-light: rgba(161, 161, 170, 0.15);
      --error: #ef4444;
      --warning: #71717a;
      --warning-light: rgba(113, 113, 122, 0.15);
      --warning-border: rgba(113, 113, 122, 0.3);
      --warning-text: #a1a1aa;
      --overlay-bg: rgba(0, 0, 0, 0.6);
      --cat-alimentacion: #a1a1aa;
    }

    /* ══════════════════════════════════════════
       BASE STYLES
       ══════════════════════════════════════════ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 40px;
      color: var(--text);
    }

    /* ══════════════════════════════════════════
       CONTROLS (outside phone frame)
       ══════════════════════════════════════════ */

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 620px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .theme-tabs {
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 4px;
      gap: 2px;
    }

    .theme-tab {
      padding: 8px 20px;
      border: none;
      background: transparent;
      color: var(--secondary); opacity: 0.5;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .theme-tab:hover {
      color: rgba(255,255,255,0.8);
    }

    .theme-tab.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-switch {
      width: 44px;
      height: 24px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    .toggle-switch.dark {
      background: rgba(255,255,255,0.3);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle-switch.dark::after {
      transform: translateX(20px);
    }

    .variant-tabs {
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 4px;
      gap: 2px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .variant-tab {
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--secondary); opacity: 0.5;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .variant-tab:hover {
      color: rgba(255,255,255,0.8);
    }

    .variant-tab.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* ══════════════════════════════════════════
       PHONE FRAME
       ══════════════════════════════════════════ */

    .phone-frame {
      width: 360px;
      height: 860px;
      background: var(--frame-bg);
      border-radius: 44px;
      padding: 12px;
      position: relative;
      box-shadow: 0 25px 80px rgba(0,0,0,0.4), inset 0 0 0 2px rgba(255,255,255,0.08);
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: var(--bg);
      border-radius: 34px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── Notch ── */
    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      background: var(--frame-bg);
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 48px;
      padding: 14px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      position: relative;
      z-index: 99;
      flex-shrink: 0;
      background: var(--bg);
    }

    .status-bar-left {
      font-size: 14px;
      font-weight: 700;
    }

    .status-bar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar-right svg {
      width: 16px;
      height: 16px;
    }

    /* ── Home Indicator ── */
    .home-indicator {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: var(--secondary);
      border-radius: 3px;
      opacity: 0.3;
      z-index: 100;
    }

    /* ══════════════════════════════════════════
       DASHBOARD BACKDROP (dimmed beneath overlay)
       ══════════════════════════════════════════ */

    .dashboard-backdrop {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Top Header */
    .top-header {
      height: 72px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--bg);
    }

    .logo-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 16px;
    }

    .wordmark {
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 22px;
      color: var(--text);
    }

    /* Dimmed dashboard content */
    .dashboard-content {
      flex: 1;
      padding: 0 16px;
      opacity: 0.35;
    }

    .dash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .dash-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .dash-card-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .dash-card-subtitle {
      font-size: 11px;
      color: var(--secondary);
    }

    .dash-amount-big {
      font-weight: 800;
      font-size: 28px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .dash-amount-label {
      font-size: 11px;
      color: var(--secondary);
    }

    /* Fake treemap blocks */
    .dash-treemap {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
      height: 80px;
      margin-top: 12px;
      border-radius: 8px;
      overflow: hidden;
    }

    .dash-treemap-cell {
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .dash-treemap-cell:first-child {
      grid-row: 1 / 3;
    }

    /* Fake recent transactions */
    .dash-txn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .dash-txn:last-child {
      border-bottom: none;
    }

    .dash-txn-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      background: rgba(var(--primary-rgb), 0.1);
    }

    .dash-txn-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .dash-txn-amount {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    /* Bottom Nav */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      padding-bottom: 6px;
      background: var(--nav-bg);
      border-top: 1px solid var(--nav-border);
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      z-index: 50;
      border-radius: 0 0 30px 30px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      padding: 4px 0 2px;
      width: 48px;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-icon svg {
      width: 22px;
      height: 22px;
      stroke-width: 2;
      stroke: var(--secondary); opacity: 0.45;
      fill: none;
    }

    .nav-item.active .nav-icon svg {
      stroke: var(--primary);
    }

    .nav-label {
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: var(--secondary); opacity: 0.5;
    }

    .nav-item.active .nav-label {
      color: var(--primary);
      font-weight: 600;
      opacity: 1;
    }



    /* ══════════════════════════════════════════
       DIALOG OVERLAY
       ══════════════════════════════════════════ */

    .dialog-overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 34px;
      padding: 20px;
      animation: overlay-fade-in 0.3s ease-out;
    }

    @keyframes overlay-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ══════════════════════════════════════════
       QUICKSAVE CARD
       ══════════════════════════════════════════ */

    .quicksave-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 0 0 1px var(--border);
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: card-slide-up 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    @keyframes card-slide-up {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── Header Section ── */
    .qs-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .qs-meta {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .qs-merchant {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.3;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .qs-category-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      background: rgba(var(--primary-rgb), 0.12);
      color: var(--primary);
      width: fit-content;
    }

    .qs-location {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      color: var(--secondary);
    }

    .qs-location svg {
      width: 12px;
      height: 12px;
      stroke: var(--secondary);
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .qs-datetime {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      color: var(--secondary);
    }

    /* ── Thumbnail + Confidence ── */
    .qs-thumbnail {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .qs-emoji-box {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(var(--primary-rgb), 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      position: relative;
    }

    .qs-confidence {
      position: absolute;
      bottom: -6px;
      right: -6px;
      background: var(--success-light);
      color: var(--success);
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 999px;
      border: 2px solid var(--surface);
      line-height: 1;
    }

    /* ── Total Highlight Box ── */
    .qs-total-box {
      background: var(--bg-tertiary);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .qs-total-icon {
      width: 16px;
      height: 16px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .qs-total-amount {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: var(--primary);
      line-height: 1;
    }

    .qs-total-currency-badge {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--secondary);
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 4px;
    }

    /* ── Items Section ── */
    .qs-items-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .qs-items-header {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
    }

    .qs-items-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .qs-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      gap: 8px;
      opacity: 0;
      transform: translateY(8px);
      animation: item-reveal 0.35s ease-out forwards;
    }

    .qs-item-row:nth-child(1) { animation-delay: 0.1s; }
    .qs-item-row:nth-child(2) { animation-delay: 0.2s; }
    .qs-item-row:nth-child(3) { animation-delay: 0.3s; }

    @keyframes item-reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .qs-item-name {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .qs-item-price-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .qs-item-qty {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--secondary);
    }

    .qs-item-price {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .qs-cat-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: var(--bg); border-radius: 10px; margin-bottom: 3px;
      opacity: 1;
    }

    .qs-cat-emoji {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .qs-cat-info { flex: 1; min-width: 0; }
    .qs-cat-name { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px; color: var(--text); }
    .qs-cat-count { font-size: 11px; color: var(--secondary); font-family: 'Outfit', sans-serif; }
    .qs-cat-total { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; }

    .qs-items-more {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      padding: 4px 0;
      opacity: 0;
      animation: item-reveal 0.35s ease-out forwards;
      animation-delay: 0.4s;
      background: none;
      border: none;
      text-align: left;
    }

    .qs-items-more:hover {
      text-decoration: underline;
    }

    /* ── Action Buttons ── */
    .qs-actions {
      display: flex;
      gap: 8px;
    }

    .qs-btn-edit {
      flex: 1;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .qs-btn-edit:hover {
      background: var(--bg-tertiary);
    }

    .qs-btn-edit svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .qs-btn-save {
      flex: 2;
      height: 48px;
      border-radius: 14px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .qs-btn-save:hover {
      filter: brightness(1.08);
    }

    .qs-btn-save svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .qs-btn-save:disabled,
    .qs-btn-edit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Cancel Link ── */
    .qs-cancel {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      color: var(--secondary);
      text-align: center;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      padding: 4px 0;
      transition: color 0.15s;
    }

    .qs-cancel:hover {
      color: var(--text);
    }

    /* ── Cancel Confirmation ── */
    .qs-cancel-confirm {
      background: var(--warning-light);
      border: 1px solid var(--warning-border);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: item-reveal 0.25s ease-out forwards;
    }

    .qs-cancel-confirm-msg {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .qs-cancel-confirm-icon {
      flex-shrink: 0;
      margin-top: 1px;
    }

    .qs-cancel-confirm-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--warning);
      fill: none;
      stroke-width: 2;
    }

    .qs-cancel-confirm-title {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--warning-text);
      margin-bottom: 2px;
    }

    .qs-cancel-confirm-subtitle {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      color: var(--secondary);
    }

    .qs-cancel-confirm-actions {
      display: flex;
      gap: 8px;
    }

    .qs-btn-back {
      flex: 1;
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: rgba(var(--primary-rgb), 0.08);
      color: var(--secondary);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .qs-btn-back:hover {
      background: rgba(var(--primary-rgb), 0.15);
    }

    .qs-btn-back svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .qs-btn-cancel-confirm {
      flex: 1;
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .qs-btn-cancel-confirm:hover {
      background: rgba(239, 68, 68, 0.18);
    }

    .qs-btn-cancel-confirm svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* ══════════════════════════════════════════
       SAVING STATE
       ══════════════════════════════════════════ */

    .qs-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ══════════════════════════════════════════
       SUCCESS STATE
       ══════════════════════════════════════════ */

    .qs-success-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 0;
      gap: 12px;
    }

    .qs-success-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--success-light);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: success-bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .qs-success-circle svg {
      width: 32px;
      height: 32px;
      stroke: var(--success);
      fill: none;
      stroke-width: 3;
    }

    @keyframes success-bounce {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        transform: scale(1.15);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .qs-success-text {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--success);
      animation: fade-in-up 0.4s ease-out 0.2s both;
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .qs-success-dismiss {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      color: var(--secondary);
      animation: fade-in-up 0.4s ease-out 0.5s both;
    }

    /* ══════════════════════════════════════════
       FOREIGN CURRENCY VARIANT
       ══════════════════════════════════════════ */

    .qs-currency-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      background: rgba(var(--primary-rgb), 0.08);
      color: var(--secondary);
      width: fit-content;
      border: 1px solid var(--border);
    }

    /* ══════════════════════════════════════════
       VARIANT VISIBILITY
       ══════════════════════════════════════════ */

    .variant-hero,
    .variant-saving,
    .variant-success,
    .variant-cancel-confirm,
    .variant-many-items,
    .variant-foreign {
      display: none;
    }

    body.show-hero .variant-hero { display: flex; }
    body.show-saving .variant-saving { display: flex; }
    body.show-success .variant-success { display: flex; }
    body.show-cancel-confirm .variant-cancel-confirm { display: flex; }
    body.show-many-items .variant-many-items { display: flex; }
    body.show-foreign .variant-foreign { display: flex; }

    /* ══════════════════════════════════════════
       RESPONSIVE
       ══════════════════════════════════════════ */

    @media (max-width: 460px) {
      .phone-frame {
        width: 100%;

        padding: 0;

        border-radius: 0;
      }
      .phone-notch { display: none; }
      .bottom-nav { border-radius: 0; }
      .dialog-overlay { border-radius: 0; }
    }
  </style>

  <!-- ════════════════════════════════════════
       JAVASCRIPT — Theme / Mode / Variant
       ════════════════════════════════════════ -->
  <script>
    (function() {
      var body = document.body;
      var themeTabs = document.querySelectorAll('.theme-tab');
      var modeToggle = document.getElementById('modeToggle');
      var variantTabs = document.querySelectorAll('.variant-tab');

      var currentTheme = 'normal';
      var currentMode = 'light';

      var allVariants = ['hero', 'saving', 'success', 'cancel-confirm', 'many-items', 'foreign'];

      function applyTheme() {
        body.setAttribute('data-theme', currentTheme);
        body.setAttribute('data-mode', currentMode);
      }

      function showVariant(variant) {
        allVariants.forEach(function(v) {
          body.classList.remove('show-' + v);
        });
        body.classList.add('show-' + variant);
      }

      // Theme tabs
      themeTabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          themeTabs.forEach(function(t) { t.classList.remove('active'); });
          tab.classList.add('active');
          currentTheme = tab.dataset.themeVal;
          applyTheme();
        });
      });

      // Mode toggle
      modeToggle.addEventListener('click', function() {
        currentMode = currentMode === 'light' ? 'dark' : 'light';
        modeToggle.classList.toggle('dark', currentMode === 'dark');
        applyTheme();
      });

      // Variant tabs
      variantTabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          variantTabs.forEach(function(t) { t.classList.remove('active'); });
          tab.classList.add('active');
          showVariant(tab.dataset.variant);
        });
      });

      // Initial apply
      applyTheme();
    })();
  </script>
