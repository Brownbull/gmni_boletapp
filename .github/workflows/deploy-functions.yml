# Auto-deploy Cloud Functions to production after tests pass on main.
#
# Triggers: after "Test Suite" workflow completes successfully on main.
# Only deploys the "default" codebase (BoletApp functions).
# Gustify functions use codebase "gustify" and are NOT affected.
#
# IMPORTANT: Never deploy firestore:rules from here — shared DB with Gustify (INC-001).
#
# Auth: FIREBASE_SERVICE_ACCOUNT secret (same as hosting deploy).
# The service account needs Cloud Functions Developer role.
# If deploy fails with permission error, grant the role in GCP IAM console.

name: Deploy Cloud Functions

on:
  workflow_run:
    workflows: ["Test Suite"]
    types: [completed]
    branches: [main]

jobs:
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    # Only deploy if the test suite passed AND functions/ files changed
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if functions changed
        id: functions-changed
        run: |
          # For merge commits, diff against both parents to detect functions/ changes.
          # git diff HEAD~1 only checks one parent and misses the merge context.
          # Use merge-base of the two parents for accurate comparison.
          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            # Merge commit: diff the merge-base of both parents against HEAD
            MERGE_BASE=$(git merge-base HEAD^1 HEAD^2)
            CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD -- functions/)
          else
            # Regular commit: simple parent diff
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- functions/)
          fi
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No functions/ changes detected — skipping deploy"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Functions changes detected:"
            echo "$CHANGED"
          fi

      - name: Setup Node.js
        if: steps.functions-changed.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        if: steps.functions-changed.outputs.skip != 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Build Cloud Functions
        if: steps.functions-changed.outputs.skip != 'true'
        run: cd functions && npm ci && npm run build

      - name: Deploy Cloud Functions
        if: steps.functions-changed.outputs.skip != 'true'
        run: |
          npm install -g firebase-tools@13
          firebase deploy --only functions:default --project boletapp-d609f --non-interactive
          echo "Cloud Functions deployed successfully!"

      - name: Skip notification
        if: steps.functions-changed.outputs.skip == 'true'
        run: echo "No functions/ changes — deploy skipped"
